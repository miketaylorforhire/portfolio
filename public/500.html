<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | Mike E. Taylor</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #0a0e1a;
      --bg-card:       #0f1524;
      --cyan:          #00d4ff;
      --cyan-glow:     rgba(0, 212, 255, 0.15);
      --white:         #f0f4ff;
      --muted:         #7a8aaa;
      --border:        rgba(0, 212, 255, 0.12);
      --nav-bg:        rgba(10, 14, 26, 0.85);
    }
    [data-theme="light"] {
      --bg:            #f0f4ff;
      --bg-card:       #ffffff;
      --cyan:          #0088aa;
      --cyan-glow:     rgba(0, 136, 170, 0.12);
      --white:         #0a0e1a;
      --muted:         #4a5a7a;
      --border:        rgba(0, 136, 170, 0.15);
      --nav-bg:        rgba(240, 244, 255, 0.92);
    }
    [data-theme="light"] .grid-bg {
      background-image:
        linear-gradient(rgba(0, 136, 170, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 136, 170, 0.06) 1px, transparent 1px);
      opacity: 1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 60px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { display: block; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 13px; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--cyan); }

    /* THEME TOGGLE */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .theme-toggle:hover { border-color: var(--cyan); }

    /* HERO */
    main { position: relative; z-index: 1; }
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 120px 60px 80px;
      position: relative; overflow: hidden;
      text-align: center; align-items: center;
    }
    .hero-glow {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner { max-width: 1100px; width: 100%; position: relative; z-index: 1; }
    .hero-eyebrow {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 6px;
      color: var(--cyan); margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: ''; display: block; width: 40px; height: 1px; background: var(--cyan);
    }
    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 20vw, 180px);
      line-height: 0.95; letter-spacing: 2px;
      color: var(--white); margin-bottom: 32px;
    }
    .hero-name span { color: var(--cyan); }
    .hero-bio {
      max-width: 520px; margin: 0 auto 40px;
      font-size: 16px; color: var(--muted); line-height: 1.8;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; background: transparent;
      border: 1px solid var(--cyan); color: var(--cyan);
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s;
      position: relative; overflow: hidden;
      text-decoration: none;
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0;
      background: var(--cyan); transform: translateX(-101%);
      transition: transform 0.25s ease;
    }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover { color: var(--bg); }
    .btn-primary span { position: relative; z-index: 1; }

    /* FOOTER */
    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 32px;
      border-top: 1px solid var(--border);
      color: var(--muted); font-size: 13px;
    }

    @media (max-width: 640px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .hero { padding: 100px 24px 60px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header>
    <nav aria-label="Main navigation">
      <a class="nav-logo" href="/" aria-label="Mike E. Taylor - Home">
        <img src="/icon.svg" alt="Mike E. Taylor" width="36" height="36" />
      </a>
      <ul class="nav-links">
        <li><a href="/#experience">Experience</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#skills">Skills</a></li>
        <li><a href="/#certifications">Certifications</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
    </nav>
  </header>

  <main>
    <section class="hero" aria-labelledby="error-heading">
      <div class="hero-glow" aria-hidden="true"></div>
      <div class="hero-inner">
        <div class="hero-eyebrow">500 — Server Error</div>
        <h1 class="hero-name" id="error-heading">5<span>0</span>0</h1>
        <p class="hero-bio">
          Something went wrong on our end. This isn't your fault — the server hit an unexpected error.
          Try again in a moment, or head back home.
        </p>
        <a class="btn-primary" href="/"><span>Back to Home</span></a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Mike E. Taylor</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) html.setAttribute('data-theme', saved);
    toggle.textContent = html.getAttribute('data-theme') === 'light' ? '☾' : '☀';
    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      toggle.textContent = next === 'light' ? '☾' : '☀';
    });
  </script>
</body>
</html>
